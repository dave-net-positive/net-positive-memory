name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test
      - run: npm run e2e
      - run: npm install -g @anthropic-ai/mcpb
      - run: npm run build
      - run: npm run pack
      - uses: actions/upload-artifact@v4
        with:
          name: net-positive-memory-mcpb
          path: net-positive-memory.mcpb

  release:
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install -g @anthropic-ai/mcpb
      - run: npm run build && npm run pack
      - uses: softprops/action-gh-release@v2
        with:
          files: net-positive-memory.mcpb
