name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm install
      - run: npm test
      - run: npm run e2e
      - run: npm install -g @anthropic-ai/mcpb
      - run: npm run build
      - run: npm run pack
      - uses: actions/upload-artifact@v7
        with:
          name: net-positive-memory-mcpb
          path: net-positive-memory.mcpb

  release:
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm install
      - run: npm install -g @anthropic-ai/mcpb
      - run: npm run build && npm run pack
      - name: Package skill
        working-directory: ${{ github.workspace }}/skill/skills
        run: zip -r "$GITHUB_WORKSPACE/net-positive-memory.skill" net-positive-memory
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            net-positive-memory.mcpb
            net-positive-memory.skill
